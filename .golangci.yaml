version: "2"
linters:
  default: none
  enable:
    - errcheck
    - exhaustive
    - exhaustruct
    - govet
    - ineffassign
    - reassign
    - unused
  settings:
    errcheck:
      check-type-assertions: false
    exhaustive:
      check:
        - switch
    exhaustruct:
      exclude:
        - ^google\.golang\.org/protobuf/internal/filedesc\..*$
        - ^google\.golang\.org/protobuf/internal/filetype\..*$
        - ^google\.golang\.org/protobuf/reflect/protoreflect\..*$
        - ^github\.com/unkeyed/unkey/gen/proto/.*$
        - ^net/http\.Client$
        - ^net/http\.Server$
        - ^net/http\.Transport$
        - ^net/url\.URL$
        - ^database/sql\.Null.*$
        - ^github\.com/prometheus/client_golang/.+Opts$
        - ^golang\.org/x/tools/go/analysis\.Analyzer$
        - ^google\.golang\.org/protobuf/.+Options$
        - ^github\.com/urfave/cli/v3.*$
        - ^github\.com/ClickHouse/clickhouse-go/v2.*$
        - ^github\.com/AfterShip/clickhouse-sql-parser/parser.*$
        - ^github\.com/aws/aws-sdk-go-v2/.*$
        - ^github\.com/stripe/stripe-go/.*$
        - ^github\.com/unkeyed/unkey/svc/api/openapi\.Meta$
        - ^github\.com/unkeyed/unkey/pkg/cli\.Command$
        - ^k8s\.io/api/core/v1.*$
        - ^k8s\.io/api/apps/v1.*$
        - ^k8s\.io/api/batch/v1.*$
        - ^k8s\.io/apimachinery/pkg/apis/meta/v1.*$
        - ^sigs\.k8s\.io/controller-runtime/pkg/client.*$
        - ^github\.com/moby/buildkit/client.*$
        - ^github\.com/docker/docker/api/types/container.*$
        - ^github\.com/docker/docker/api/types/image.*$
        - ^github\.com/docker/docker/api/types/registry\.AuthConfig$
        - ^github\.com/docker/cli/cli/config/configfile\.ConfigFile$
    govet:
      disable:
        - inline
      enable:
        - appends
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - defers
        - directive
        - errorsas
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - sigchanyzer
        - slog
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - exhaustruct
        path: _test\.go
      - linters:
          - unused
        path: _test\.go
      - linters:
          - exhaustive
        path: pkg/config/tags\.go
      - linters:
          - unused
        path: svc/heimdall/internal/collector/cgroup_stub\.go
    paths:
      - third_party$
      - builtin$
      - examples$
      - \.claude/
issues:
  max-same-issues: 50
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - \.claude/
