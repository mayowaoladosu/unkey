---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontline-config
  namespace: frontline
data:
  unkey.toml: |
    platform = "dev"
    region = "local"
    http_port = 7070
    https_port = 7443
    apex_domain = "unkey.local"
    ctrl_addr = "http://ctrl-api.unkey.svc.cluster.local:7091"
    static_artifact_cache_entries = 32
    route_cache_poll_interval = "500ms"

    [artifact_storage]
    endpoint = "http://s3.unkey.svc.cluster.local:3902"
    region = "auto"
    bucket = "vault"
    access_key_id = "minio_root_user"
    secret_access_key = "minio_root_password"
    use_path_style = true
    create_bucket = false

    [database]
    primary = "unkey:password@tcp(mysql.unkey.svc.cluster.local:3306)/unkey?parseTime=true&interpolateParams=true"

    [redis]
    url = "redis://default:password@redis.unkey.svc.cluster.local:6379"

    [clickhouse]
    url = "clickhouse://default:password@clickhouse.unkey.svc.cluster.local:9000?secure=false&skip_verify=true"

    [tls]
    cert_file = "/certs/unkey.local.crt"
    key_file = "/certs/unkey.local.key"

    [vault]
    url = "http://vault.unkey.svc.cluster.local:8060"
    token = "vault-test-token-123"

    [pprof]
    username = "admin"
    password = "password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontline
  namespace: frontline
  labels:
    app: frontline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontline
  template:
    metadata:
      labels:
        app: frontline
    spec:
      containers:
        - name: frontline
          image: unkey/frontline:dev
          args: ["--config", "/etc/unkey/unkey.toml"]
          imagePullPolicy: Never
          ports:
            - containerPort: 7070
              name: http
            - containerPort: 7443
              name: https
          volumeMounts:
            - name: config
              mountPath: /etc/unkey
              readOnly: true
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /_unkey/internal/health/ready
              port: 7070
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_unkey/internal/health/live
              port: 7070
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: frontline-config
        - name: tls-certs
          configMap:
            name: frontline-certs
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql.unkey.svc.cluster.local 3306 && nc -z ctrl-api.unkey.svc.cluster.local 7091 && nc -z vault.unkey.svc.cluster.local 8060 && nc -z s3.unkey.svc.cluster.local 3902; do sleep 2; done",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: frontline
  namespace: frontline
spec:
  selector:
    app: frontline
  ports:
    - name: http
      port: 80
      targetPort: 7070
    - name: https
      port: 443
      targetPort: 7443
  type: LoadBalancer
