type: object
required:
  - name
  - enabled
properties:
  id:
    type: string
    pattern: "^pol_[a-zA-Z0-9]+$"
    minLength: 5
    maxLength: 256
    description: |-
      Server-generated policy id. Omit when creating a policy; pass the id of
      an existing policy to replace it in place. Always present in responses.
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: Human-readable name shown in the dashboard.
  enabled:
    type: boolean
    description: Disabled policies are stored but skipped during evaluation.
  match:
    type: array
    maxItems: 10
    items:
      "$ref": "./MatchExpr.yaml"
    description: |-
      Optional request matchers. The policy applies only to requests matching
      all expressions; omit to apply to every request.
  keyauth:
    "$ref": "./KeyauthPolicy.yaml"
  ratelimit:
    "$ref": "./RatelimitPolicy.yaml"
  firewall:
    "$ref": "./FirewallPolicy.yaml"
  openapi:
    "$ref": "./OpenapiPolicy.yaml"
additionalProperties: false
description: |-
  A gateway policy. Exactly one of `keyauth`, `ratelimit`, `firewall` or
  `openapi` must be set. Policy ids are generated by the server on create;
  pass an existing id to replace that policy in place.
example:
  name: Block internal paths
  enabled: true
  match:
    - path:
        path:
          prefix: /internal/
  firewall:
    action: ACTION_DENY
