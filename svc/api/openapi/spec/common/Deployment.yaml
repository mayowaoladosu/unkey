type: object
required:
  - id
  - projectId
  - appId
  - environmentId
  - status
  - desiredState
  - trigger
  - cpuMillicores
  - memoryMib
  - storageMib
  - port
  - command
  - shutdownSignal
  - upstreamProtocol
  - createdAt
properties:
  id:
    type: string
    description: |
      The unique identifier of the deployment, generated by Unkey.
    example: dep_1234abcd
  projectId:
    type: string
    description: |
      The unique identifier of the project this deployment belongs to.
    example: proj_1234abcd
  appId:
    type: string
    description: |
      The unique identifier of the app this deployment belongs to.
    example: app_1234abcd
  environmentId:
    type: string
    description: |
      The unique identifier of the environment this deployment targets.
    example: env_1234abcd
  status:
    type: string
    enum:
      - pending
      - starting
      - building
      - deploying
      - network
      - finalizing
      - ready
      - failed
      - skipped
      - awaiting_approval
      - stopped
      - superseded
      - cancelled
    x-enum-varnames:
      - DeploymentStatusPending
      - DeploymentStatusStarting
      - DeploymentStatusBuilding
      - DeploymentStatusDeploying
      - DeploymentStatusNetwork
      - DeploymentStatusFinalizing
      - DeploymentStatusReady
      - DeploymentStatusFailed
      - DeploymentStatusSkipped
      - DeploymentStatusAwaitingApproval
      - DeploymentStatusStopped
      - DeploymentStatusSuperseded
      - DeploymentStatusCancelled
    description: |
      Current lifecycle status of the deployment. Poll until it reaches a
      terminal state: ready (serving), failed, skipped, superseded, stopped,
      or cancelled.
    example: ready
  desiredState:
    type: string
    enum:
      - running
      - stopped
    x-enum-varnames:
      - DeploymentDesiredStateRunning
      - DeploymentDesiredStateStopped
    description: |
      The state the deployment is meant to be in. running means it should be
      serving; stopped means it has been scaled down.
    example: running
  gitCommitSha:
    type: string
    description: |
      Full SHA of the git commit this deployment was built from.
      Omitted for prebuilt-image deployments.
    example: 9f2c1a7c8e4b2d1f0a3e5c7b9d1f2a4c6e8b0d2f
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  gitBranch:
    type: string
    description: |
      Git branch this deployment was built from.
      Omitted for prebuilt-image deployments.
    example: main
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  gitCommitMessage:
    type: string
    description: |
      Message of the git commit this deployment was built from.
      Omitted for prebuilt-image deployments.
    example: "fix: handle empty payloads"
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  gitCommitAuthorHandle:
    type: string
    description: |
      Git handle of the commit author.
      Omitted for prebuilt-image deployments.
    example: octocat
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  gitCommitAuthorAvatarUrl:
    type: string
    description: |
      Avatar URL of the commit author.
      Omitted for prebuilt-image deployments.
    example: https://avatars.githubusercontent.com/u/583231
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  gitCommitTimestamp:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds of the git commit.
      Omitted for prebuilt-image deployments.
    example: 1704067200000
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  prNumber:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Pull request number this deployment was triggered by, if any.
    example: 42
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  forkRepository:
    type: string
    description: |
      Fork the deployment was built from, as "owner/repo", if any.
    example: contributor/acme-api
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  image:
    type: string
    description: |
      Container image reference this deployment runs.
      Omitted until the image has been resolved.
    example: ghcr.io/acme/api:v1.2.3
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  trigger:
    type: string
    enum:
      - unknown
      - github
      - api
      - cli
      - dashboard
      - unkey
    x-enum-varnames:
      - DeploymentTriggerUnknown
      - DeploymentTriggerGithub
      - DeploymentTriggerApi
      - DeploymentTriggerCli
      - DeploymentTriggerDashboard
      - DeploymentTriggerUnkey
    description: |
      What triggered this deployment.
    example: api
  triggeredBy:
    type: string
    description: |
      Identifier of the actor that triggered this deployment.
    example: user_1234abcd
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  triggerReason:
    type: string
    description: |
      Human-readable reason the deployment was triggered, if any.
    example: Redeploy from dashboard
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  cpuMillicores:
    type: integer
    description: |
      CPU allocation in millicores (1000 = one vCPU).
    example: 250
  memoryMib:
    type: integer
    description: |
      Memory allocation in mebibytes.
    example: 256
  storageMib:
    type: integer
    description: |
      Ephemeral storage allocation in mebibytes.
    example: 0
  port:
    type: integer
    description: |
      Port the container listens on.
    example: 8080
  command:
    type: array
    items:
      type: string
    description: |
      Container entrypoint command override. Empty when none is set.
    example: ["node", "server.js"]
  shutdownSignal:
    "$ref": "./EnvironmentShutdownSignal.yaml"
  upstreamProtocol:
    "$ref": "./EnvironmentUpstreamProtocol.yaml"
  healthcheck:
    "$ref": "./EnvironmentHealthcheck.yaml"
    description: |
      HTTP health probe configuration. Omitted when no healthcheck is configured.
  createdAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the deployment was created.
    example: 1704067200000
  updatedAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the deployment was last updated.
      Omitted if the deployment has never been updated.
    example: 1704153600000
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
additionalProperties: false
