post:
  tags:
    - environments
  summary: Set environment variables
  description: |
    Create or update environment variables for an environment in a single atomic
    request.

    By default this is an upsert: each variable in the payload is created if new
    or fully overwritten if the key already exists, and any variable not in the
    payload is left untouched. This lets you change one variable without
    re-sending the others, which matters for write-only secrets you can no longer
    read back.

    Set `prune: true` to make it a full replace instead: after upserting, every
    variable not in the payload is deleted. Sending `prune: true` with an empty
    `variables` list resets the environment by deleting every variable.

    Each variable is written exactly as sent, never merged, so omitted optional
    fields fall back to their defaults rather than the previous value. Values are
    always encrypted at rest. Set `kind: recoverable` to allow a value to be read
    back; it defaults to `writeonly`, which can never be read back through the API.

    **Required Permissions**

    Your root key must have one of the following permissions:
    - `environment.*.set_environment_variables` (for any environment)
    - `environment.<environment_id>.set_environment_variables` (for a specific environment)
  operationId: environments.setEnvironmentVariables
  x-speakeasy-name-override: setEnvironmentVariables
  security:
    - rootKey: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2EnvironmentsSetEnvironmentVariablesRequestBody.yaml"
        examples:
          upsert:
            summary: Upsert (default) - change one variable, keep the rest
            description: |-
              Without `prune`, only the listed variables are created or
              overwritten. Every other variable, including write-only secrets you
              can no longer read back, is left untouched. Here LOG_LEVEL is
              flipped to info and nothing else is affected.
            value:
              project: payments
              app: payments-api
              environment: production
              variables:
                - key: LOG_LEVEL
                  value: info
                  kind: recoverable
          replace:
            summary: Full replace with prune
            description: |-
              With `prune: true`, the listed variables become the entire
              environment. Any variable not in the list is deleted.
            value:
              project: payments
              app: payments-api
              environment: production
              prune: true
              variables:
                - key: DATABASE_URL
                  value: postgresql://user:pass@host:5432/db
                  kind: writeonly
                - key: LOG_LEVEL
                  value: debug
                  kind: recoverable
                  description: Application log verbosity
          reset:
            summary: Reset - delete every variable
            description: |-
              An empty `variables` list with `prune: true` deletes every variable
              in the environment.
            value:
              project: payments
              app: payments-api
              environment: production
              prune: true
              variables: []
    required: true
  responses:
    "200":
      description: |
        Successfully set the environment variables.
      content:
        application/json:
          schema:
            "$ref": "./V2EnvironmentsSetEnvironmentVariablesResponseBody.yaml"
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden - Insufficient permissions (requires `environment.*.set_environment_variables`)
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not Found - The requested environment does not exist in your workspace
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            "$ref": "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
