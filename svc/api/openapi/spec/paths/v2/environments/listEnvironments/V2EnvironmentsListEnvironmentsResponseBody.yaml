          createdAt: 1704240000000
          runtime:
            port: 8080
            vCpus: 0.25
            memoryMib: 256
            storageMib: 0
            command: ["node", "server.js"]
            shutdownSignal: SIGTERM
            upstreamProtocol: http1
          build:
