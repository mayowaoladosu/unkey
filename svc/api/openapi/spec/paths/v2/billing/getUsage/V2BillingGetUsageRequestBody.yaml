type: object
required:
  - year
  - month
properties:
  year:
    type: integer
    minimum: 2020
    maximum: 2100
    description: Billing period year (UTC).
    example: 2026
  month:
    type: integer
    minimum: 1
    maximum: 12
    description: Billing period month (UTC, 1-12).
    example: 6
  externalId:
    type: string
    minLength: 1
    maxLength: 256
    description: Restrict the result to one end-user identity by its external id.
additionalProperties: false
