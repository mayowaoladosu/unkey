post:
  tags:
    - portal
  summary: Delete portal key
  description: |
    Delete an API key owned by the authenticated portal session's end user.

    This is the portal-scoped variant of `keys.deleteKey`. It authenticates only
    with a portal session cookie and may only delete keys owned by the session's
    external identity; any other key returns 404.
  operationId: portal.deleteKey
  x-speakeasy-name-override: deleteKey
  security:
    - portalSession: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "../../keys/deleteKey/V2KeysDeleteKeyRequestBody.yaml"
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            "$ref": "../../keys/deleteKey/V2KeysDeleteKeyResponseBody.yaml"
      description: |
        Key deleted successfully.
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../error/InternalServerErrorResponse.yaml"
