post:
  tags:
    - portal
  summary: Get portal verifications
  description: |
    Query key verification analytics for the authenticated portal session's end
    user.

    This is the portal-scoped variant of `analytics.getVerifications`. It
    authenticates only with a portal session cookie and always restricts results
    to verification events attributed to the session's external identity.
  operationId: portal.getVerifications
  x-speakeasy-name-override: getVerifications
  security:
    - portalSession: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "../../analytics/getVerifications/V2AnalyticsGetVerificationsRequestBody.yaml"
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            "$ref": "../../analytics/getVerifications/V2AnalyticsGetVerificationsResponseBody.yaml"
      description: |
        Successfully retrieved verification analytics.
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../error/InternalServerErrorResponse.yaml"
