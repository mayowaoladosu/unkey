post:
  tags:
    - portal
  summary: Create portal key
  description: |
    Create a new API key owned by the authenticated portal session's end user.

    This is the portal-scoped variant of `keys.createKey`. It authenticates only
    with a portal session cookie and always assigns the created key to the
    session's external identity; any `externalId` in the request body is ignored.
  operationId: portal.createKey
  x-speakeasy-name-override: createKey
  security:
    - portalSession: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "../../keys/createKey/V2KeysCreateKeyRequestBody.yaml"
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            "$ref": "../../keys/createKey/V2KeysCreateKeyResponseBody.yaml"
      description: |
        Key created successfully. The plaintext key is returned exactly once.
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../../../../error/InternalServerErrorResponse.yaml"
