type: object
properties:
  branch:
    type: string
    maxLength: 256
    description: Branch to build (its HEAD). Omit branch and commitSha to use the app's default branch.
    example: "main"
  commitSha:
    type: string
    maxLength: 40
    description: Commit to build (full or abbreviated SHA). Takes precedence over branch.
    example: "9f2c1a7"
  repository:
    type: string
    pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
    maxLength: 256
    description: Build from a fork instead of the app's connected repository, as "owner/repo". Requires commitSha.
    example: "contributor/acme-api"
description: Build from the app's connected GitHub repository.
