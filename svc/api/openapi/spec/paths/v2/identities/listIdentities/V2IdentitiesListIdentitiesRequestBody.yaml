type: object
properties:
  limit:
    type: integer
    minimum: 1
    maximum: 100
    default: 100
    description: The maximum number of identities to return in a single request.
      Use this to control response size and loading performance.
    example: 50
  cursor:
    type: string
    description: Pagination cursor from a previous response. Use this to fetch
      subsequent pages of results when the response contains a cursor value.
    example: cursor_eyJrZXkiOiJrZXlfMTIzNCJ9
  search:
    type: string
    maxLength: 256
    description: Free-form text to filter identities. Returns identities whose
      ID or external ID contains the search string. Matching is
      case-insensitive.
    example: user_123
additionalProperties: false
