post:
  tags:
    - policies
  summary: Create policies
  description: |
    Append one or more gateway policies to an environment in a single atomic
    request. Policies run at the edge before requests reach your app: verify
    API keys, rate limit, block requests outright, or validate them against
    your OpenAPI spec.

    Each policy sets exactly one of `keyauth`, `ratelimit`, `firewall` or
    `openapi`, plus optional `match` expressions restricting which requests it
    applies to. Policy ids are generated by the server. New policies are
    appended after existing ones; an environment can hold at most 10 policies.

    The operation is atomic: if any policy is invalid, nothing is written.

    **Required Permissions**

    Your root key must have one of the following permissions:
    - `environment.*.create_policy` (for any environment)
    - `environment.<environment_id>.create_policy` (for a specific environment)
  operationId: policies.createPolicy
  x-speakeasy-name-override: createPolicy
  security:
    - rootKey: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2PoliciesCreatePolicyRequestBody.yaml"
        examples:
          firewall:
            summary: Block a path prefix
            value:
              project: payments
              app: payments-api
              environment: production
              policies:
                - name: Block internal paths
                  enabled: true
                  match:
                    - path:
                        path:
                          prefix: /internal/
                  firewall:
                    action: ACTION_DENY
          keyauthAndRatelimit:
            summary: Require API keys and rate limit by IP in one request
            value:
              project: payments
              app: payments-api
              environment: production
              policies:
                - name: Require API key
                  enabled: true
                  keyauth:
                    keySpaceIds:
                      - ks_1234abcd
                - name: Global IP limit
                  enabled: true
                  ratelimit:
                    limit: 100
                    windowMs: 60000
                    identifier:
                      remoteIp: {}
    required: true
  responses:
    "200":
      description: |
        Successfully created the policies.
      content:
        application/json:
          schema:
            "$ref": "./V2PoliciesCreatePolicyResponseBody.yaml"
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden - Insufficient permissions (requires `environment.*.create_policy`)
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not Found - The requested environment does not exist in your workspace
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            "$ref": "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
