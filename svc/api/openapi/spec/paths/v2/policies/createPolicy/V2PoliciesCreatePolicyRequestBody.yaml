type: object
required:
  - project
  - app
  - environment
  - policies
properties:
  project:
    "$ref": "../../../../common/ResourceIdentifier.yaml"
  app:
    "$ref": "../../../../common/ResourceIdentifier.yaml"
  environment:
    "$ref": "../../../../common/ResourceIdentifier.yaml"
  policies:
    type: array
    minItems: 1
    maxItems: 10
    items:
      "$ref": "../../../../common/Policy.yaml"
    description: |-
      Policies to append to the environment, evaluated after any existing
      policies. The whole operation is atomic: if any policy is invalid,
      nothing is written. An environment can hold at most 10 policies in
      total, including existing ones.
additionalProperties: false
examples:
  firewall:
    summary: Block a path prefix
    value:
      project: payments
      app: payments-api
      environment: production
      policies:
        - name: Block internal paths
          enabled: true
          match:
            - path:
                path:
                  prefix: /internal/
          firewall:
            action: ACTION_DENY
  keyauthAndRatelimit:
    summary: Require API keys and rate limit by IP in one request
    value:
      project: payments
      app: payments-api
      environment: production
      policies:
        - name: Require API key
          enabled: true
          keyauth:
            keySpaceIds:
              - ks_1234abcd
        - name: Global IP limit
          enabled: true
          ratelimit:
            limit: 100
            windowMs: 60000
            identifier:
              remoteIp: {}
