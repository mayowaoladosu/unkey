syntax = "proto3";

package hydra.v1;

import "ctrl/v1/actor.proto";
import "dev/restate/sdk/go.proto";

option go_package = "github.com/unkeyed/unkey/gen/proto/hydra/v1;hydrav1";

// ProjectService manages project lifecycle.
// Key: project_id
service ProjectService {
  option (dev.restate.sdk.go.service_type) = VIRTUAL_OBJECT;

  // DeletePermanently removes the project and cascades hard cleanup
  // through every descendant. Invoked by the permanent-delete cron
  // sweep once the grace window has elapsed, or directly if no grace
  // window is desired.
  rpc DeletePermanently(DeleteProjectPermanentlyRequest) returns (DeleteProjectPermanentlyResponse) {}

  // MarkForDeletion enters the soft-delete grace window. The caller
  // (the public ctrl handler) mints the deletion_id and the
  // delete_permanently_at; this handler inserts the deletions row and
  // points the project's deletion_id at it, then Sends MarkForDeletion
  // to every live app under it carrying the same deletion_id.
  // Descendants reuse the id (no new deletion row) so the cascade tree
  // shares one identifier.
  rpc MarkForDeletion(MarkProjectForDeletionRequest) returns (MarkProjectForDeletionResponse) {}

  // Restore reverses MarkForDeletion for this project and every
  // descendant whose deletion_id matches the project's. Independently-
  // deleted children (different deletion_id) are left alone. Deployment
  // status is not reversed; the user is expected to trigger a fresh
  // deployment.
  rpc Restore(RestoreProjectRequest) returns (RestoreProjectResponse) {}
}

// DeleteProjectPermanentlyRequest carries the caller identity and correlation ID
// into the durable hard-delete workflow so the project.delete audit log is
// written as part of the retried deletion unit, and the same correlation ID can
// be threaded down to each cascaded app and environment delete.
message DeleteProjectPermanentlyRequest {
  ctrl.v1.ActorInfo actor = 1;
  // correlation_id groups this hard delete with every cascaded app.delete and
  // environment.delete audit event. Minted at the original delete RPC entry point.
  string correlation_id = 2;
}
message DeleteProjectPermanentlyResponse {}

message MarkProjectForDeletionRequest {
  // deletion_id is minted by the public ctrl handler and used as the
  // single shared identifier across every cascaded descendant.
  string deletion_id = 1;
  // delete_permanently_at is stored on the deletions row only at the
  // root; cascaded children point at the same row via deletion_id and
  // do not duplicate the timestamp.
  int64 delete_permanently_at = 2;
  // Actor and correlation are persisted in the journal so the eventual hard
  // delete can emit the same audit trail as an immediate delete.
  ctrl.v1.ActorInfo actor = 3;
  string correlation_id = 4;
}
message MarkProjectForDeletionResponse {}

message RestoreProjectRequest {}
message RestoreProjectResponse {}
