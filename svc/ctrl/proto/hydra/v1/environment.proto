syntax = "proto3";

package hydra.v1;

import "ctrl/v1/actor.proto";
import "dev/restate/sdk/go.proto";

option go_package = "github.com/unkeyed/unkey/gen/proto/hydra/v1;hydrav1";

// EnvironmentService manages environment lifecycle.
// Key: environment_id
service EnvironmentService {
  option (dev.restate.sdk.go.service_type) = VIRTUAL_OBJECT;

  // DeletePermanently removes the environment and its associated
  // resources.
  rpc DeletePermanently(DeleteEnvironmentPermanentlyRequest) returns (DeleteEnvironmentPermanentlyResponse) {}

  // MarkForDeletion sets the environment's deletion_id to
  // req.deletion_id and flips every non-terminal deployment under it
  // to status='stopped' so krane scales the pods to zero. The deletions
  // row was already written by the cascade root. There is no further
  // cascade — deployments are not first-class soft-delete resources.
  rpc MarkForDeletion(MarkEnvironmentForDeletionRequest) returns (MarkEnvironmentForDeletionResponse) {}

  // Restore clears the environment's deletion_id only if it equals
  // req.deletion_id. Does not revive deployment status; the user is
  // expected to trigger a fresh deployment.
  rpc Restore(RestoreEnvironmentRequest) returns (RestoreEnvironmentResponse) {}
}

// DeleteEnvironmentPermanentlyRequest carries the caller identity and
// correlation ID into the durable workflow so the environment.delete audit log
// is written as part of the retried deletion unit. Environment deletes are
// cascade-only, so these always arrive from a parent app or project teardown.
message DeleteEnvironmentPermanentlyRequest {
  ctrl.v1.ActorInfo actor = 1;
  // correlation_id groups this deletion with the parent teardown's other audit
  // events. Threaded down from the app/project workflow.
  string correlation_id = 2;
}
message DeleteEnvironmentPermanentlyResponse {}

message MarkEnvironmentForDeletionRequest {
  string deletion_id = 1;
  ctrl.v1.ActorInfo actor = 2;
  string correlation_id = 3;
}
message MarkEnvironmentForDeletionResponse {}

message RestoreEnvironmentRequest {
  string deletion_id = 1;
}
message RestoreEnvironmentResponse {}
